<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        #start-button {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 9999; padding: 20px 40px; background: #FF6B6B; color: white;
            border: none; border-radius: 50px; font-size: 18px; font-weight: bold;
        }
        /* ข้อความแจ้งเตือนเล็กๆ ถ้าวิดีโอไม่เล่น */
        #instruction {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 9998; color: white; background: rgba(0,0,0,0.5); padding: 5px 15px;
            border-radius: 10px; display: none; font-family: sans-serif;
        }
    </style>
</head>
<body>
    <button id="start-button">เริ่มโปรเจกต์ Memii Adventure</button>
    <div id="instruction">สแกนติดแล้ว "แตะหน้าจอ 1 ครั้ง" เพื่อเล่นวิดีโอ</div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: false;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        <a-assets>
            <video id="vid1" src="./vdo1.mp4" loop="true" crossorigin="anonymous" playsinline webkit-playsinline muted></video>
            <video id="vid2" src="./vdo2.mp4" loop="true" crossorigin="anonymous" playsinline webkit-playsinline muted></video>
            <video id="vid3" src="./vdo3.mp4" loop="true" crossorigin="anonymous" playsinline webkit-playsinline muted></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="ent1" mindar-image-target="targetIndex: 0">
            <a-video src="#vid1" width="0.63" height="1.12" position="0 0 0"></a-video>
        </a-entity>
        <a-entity id="ent2" mindar-image-target="targetIndex: 1">
            <a-video src="#vid2" width="0.63" height="1.12" position="0 0 0"></a-video>
        </a-entity>
        <a-entity id="ent3" mindar-image-target="targetIndex: 2">
            <a-video src="#vid3" width="0.63" height="1.12" position="0 0 0"></a-video>
        </a-entity>
    </a-scene>

    <script>
        const startButton = document.querySelector('#start-button');
        const sceneEl = document.querySelector('a-scene');
        const instruction = document.querySelector('#instruction');
        const vids = [document.querySelector('#vid1'), document.querySelector('#vid2'), document.querySelector('#vid3')];

        startButton.addEventListener('click', () => {
            sceneEl.systems["mindar-image-system"].start();
            // บังคับ Play และ Pause ทันทีเพื่อ "ปลุก" วิดีโอทุกตัว
            vids.forEach(v => { v.play().then(() => v.pause()); });
            startButton.style.display = 'none';
            instruction.style.display = 'block';
        });

        // เมื่อสแกนเจอ
        sceneEl.addEventListener("targetFound", event => {
            const index = event.detail.index;
            if (vids[index]) {
                vids[index].muted = true; // Android ชอบแบบไม่มีเสียงก่อน
                vids[index].play();
                // พยายามเปิดเสียงหลังจากเล่นไปแล้วครึ่งวินาที
                setTimeout(() => { vids[index].muted = false; }, 500);
            }
        });

        // เมื่อสแกนหลุด
        sceneEl.addEventListener("targetLost", event => {
            const index = event.detail.index;
            if (vids[index]) vids[index].pause();
        });

        // "ไม้ตาย": ถ้าสแกนติดแต่ไม่ขยับ ให้ผู้ใช้แตะหน้าจอเพื่อบังคับ Play
        window.addEventListener('click', () => {
            vids.forEach(v => {
                if (v.paused && !startButton.style.display === 'none') v.play();
            });
        });
    </script>
</body>
</html>
