<!DOCTYPE html>
<html>
  <head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.2.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
</head>
  <body>
    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no; uiScanning: no;" 
             color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="vid0" src="./vdo1.mp4" loop="true" crossorigin="anonymous" playsinline webkit-playsinline></video>
        <video id="vid1" src="./vdo2.mp4" loop="true" crossorigin="anonymous" playsinline webkit-playsinline></video>
        <video id="vid2" src="./vdo3.mp4" loop="true" crossorigin="anonymous" playsinline webkit-playsinline></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;" raycaster="far: 10000; objects: .clickable"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-video src="#vid0" width="1" height="1" position="0 0 0" rotation="0 0 0"></a-video>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 1">
        <a-video src="#vid1" width="1" height="1" position="0 0 0" rotation="0 0 0"></a-entity>

      <a-entity mindar-image-target="targetIndex: 2">
        <a-video src="#vid2" width="1" height="1" position="0 0 0" rotation="0 0 0"></a-entity>

    </a-scene>

    <script>
      // สคริปต์สั่งให้วิดีโอเล่นเมื่อสแกนเจอ และหยุดเมื่อเลื่อนกล้องออก (สำคัญมาก!)
      const sceneEl = document.querySelector('a-scene');
      sceneEl.addEventListener("targetFound", event => {
        const index = event.detail.index;
        const video = document.querySelector(`#vid${index}`);
        if (video) video.play();
      });
      sceneEl.addEventListener("targetLost", event => {
        const index = event.detail.index;
        const video = document.querySelector(`#vid${index}`);
        if (video) video.pause();
      });
    </script>
  </body>
</html>
